<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Скалодром — Мои привилегии</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mulish:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.07);
    --accent: #6ee7f7;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --gold: #fbbf24;
    --red: #f87171;
    --text: #f1f5f9;
    --muted: #64748b;
    --radius: 16px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Mulish", sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Animated background ── */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(110,231,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(167,139,250,0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.7s ease both;
  }
  .header-icon {
    font-size: 52px;
    display: block;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 24px rgba(110,231,247,0.4));
  }
  .header h1 {
    font-family: "Bebas Neue", sans-serif;
    font-size: clamp(36px, 8vw, 52px);
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }
  .header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* ── Search box ── */
  .search-section {
    animation: fadeUp 0.7s 0.1s ease both;
  }
  .search-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    display: block;
  }
  .search-row {
    display: flex;
    gap: 10px;
  }
  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    font-family: "Mulish", sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input::placeholder { color: var(--muted); font-weight: 300; }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(110,231,247,0.12);
  }
  .search-btn {
    background: var(--accent);
    color: #0a0e1a;
    border: none;
    border-radius: var(--radius);
    padding: 16px 24px;
    font-family: "Mulish", sans-serif;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
  }
  .search-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(110,231,247,0.3);
  }
  .search-btn:active { transform: translateY(0); }

  /* ── Error ── */
  .error-msg {
    margin-top: 14px;
    padding: 12px 16px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 10px;
    color: var(--red);
    font-size: 13px;
    font-weight: 600;
    display: none;
  }

  /* ── Result card ── */
  .card {
    margin-top: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    display: none;
    animation: fadeUp 0.5s ease both;
  }

  /* Card header */
  .card-header {
    padding: 28px 28px 24px;
    background: linear-gradient(135deg, #1a2235 0%, #111827 100%);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .card-header::after {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .emp-name {
    font-family: "Bebas Neue", sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    line-height: 1;
  }
  .emp-meta {
    display: flex;
    gap: 12px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .emp-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
  }
  .emp-tag.accent { background: rgba(110,231,247,0.1); color: var(--accent); }

  /* Level badge */
  .level-badge {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .level-badge.lvl0  { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); }
  .level-badge.lvl1  { background: rgba(96,165,250,0.1);  border: 1px solid rgba(96,165,250,0.2); }
  .level-badge.lvl2  { background: rgba(52,211,153,0.1);  border: 1px solid rgba(52,211,153,0.2); }
  .level-badge.lvl3  { background: rgba(251,191,36,0.1);  border: 1px solid rgba(251,191,36,0.2); }
  .level-badge.lvl4  { background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.35); }

  .level-icon { font-size: 32px; flex-shrink: 0; }
  .level-info {}
  .level-title {
    font-family: "Bebas Neue", sans-serif;
    font-size: 22px;
    letter-spacing: 1.5px;
    line-height: 1;
  }
  .level-badge.lvl0 .level-title  { color: var(--red); }
  .level-badge.lvl1 .level-title  { color: #60a5fa; }
  .level-badge.lvl2 .level-title  { color: var(--accent3); }
  .level-badge.lvl3 .level-title  { color: var(--gold); }
  .level-badge.lvl4 .level-title  { color: var(--accent2); }

  .level-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 400;
  }

  /* Stats grid */
  .stats-grid {
    padding: 24px 28px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }
  .stat-card.full { grid-column: 1 / -1; }
  .stat-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
  }
  .stat-value.green  { color: var(--accent3); }
  .stat-value.blue   { color: #60a5fa; }
  .stat-value.gold   { color: var(--gold); }
  .stat-value.purple { color: var(--accent2); }
  .stat-value.red    { color: var(--red); }
  .stat-value.muted  { color: var(--muted); font-size: 14px; font-weight: 400; }

  /* Privileges list */
  .privs-section {
    padding: 0 28px 24px;
  }
  .privs-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .priv-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    border-radius: 12px;
    margin-bottom: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 14px;
    font-weight: 600;
    transition: border-color 0.2s;
  }
  .priv-item.active {
    border-color: rgba(52,211,153,0.3);
    background: rgba(52,211,153,0.05);
  }
  .priv-item.locked {
    opacity: 0.4;
  }
  .priv-item.god-priv {
    border-color: rgba(167,139,250,0.4);
    background: rgba(167,139,250,0.07);
  }
  .priv-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .priv-item.active  .priv-dot { background: var(--accent3); box-shadow: 0 0 8px var(--accent3); }
  .priv-item.locked  .priv-dot { background: var(--muted); }
  .priv-item.god-priv .priv-dot { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
  .priv-icon { font-size: 18px; }
  .priv-text { flex: 1; }
  .priv-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 5px;
    letter-spacing: 0.5px;
  }
  .priv-badge.auto { background: rgba(52,211,153,0.15); color: var(--accent3); }
  .priv-badge.manager { background: rgba(251,191,36,0.15); color: var(--gold); }
  .priv-badge.god-only { background: rgba(167,139,250,0.2); color: var(--accent2); }

  /* Quarters */
  .quarters-section {
    padding: 0 28px 28px;
  }
  .quarters-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .quarters-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .q-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    position: relative;
    overflow: hidden;
  }
  .q-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .q-remain {
    font-family: "Bebas Neue", sans-serif;
    font-size: 36px;
    line-height: 1;
    letter-spacing: 1px;
  }
  .q-remain.full   { color: var(--accent3); }
  .q-remain.partial{ color: var(--gold); }
  .q-remain.empty  { color: var(--red); }
  .q-remain.na     { color: var(--muted); font-size: 20px; }
  .q-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .q-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    border-radius: 0 0 12px 12px;
    transition: width 0.8s 0.3s ease;
  }
  .q-bar.full   { background: var(--accent3); }
  .q-bar.partial{ background: var(--gold); }
  .q-bar.empty  { background: var(--red); }

  /* Stazh block */
  .stazh-block {
    padding: 0 28px 28px;
  }
  .stazh-inner {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .stazh-icon { font-size: 28px; }
  .stazh-info {}
  .stazh-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .stazh-value { font-size: 18px; font-weight: 900; margin-top: 3px; }
  .stazh-bonus {
    margin-left: auto;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 8px;
    background: rgba(52,211,153,0.12);
    color: var(--accent3);
    letter-spacing: 0.5px;
  }
  .stazh-bonus.inactive {
    background: rgba(100,116,139,0.1);
    color: var(--muted);
  }

  /* Footer */
  .card-footer {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 11px;
    color: var(--muted);
  }

  /* Loader */
  .loader {
    display: none;
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 13px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <span class="header-icon">🧗</span>
    <h1>МОИ ПРИВИЛЕГИИ</h1>
    <p>Скалодром · Система льгот сотрудников</p>
  </div>

  <!-- Search -->
  <div class="search-section">
    <label class="search-label">Найти сотрудника</label>
    <div class="search-row">
      <input
        type="text"
        class="search-input"
        id="nameInput"
        placeholder="Введи фамилию..."
        autocomplete="off"
        autocorrect="off"
      />
      <button class="search-btn" onclick="search()">НАЙТИ</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    Ищем...
  </div>

  <!-- Result card -->
  <div class="card" id="resultCard">

    <div class="card-header">
      <div class="emp-name" id="empName">—</div>
      <div class="emp-meta">
        <span class="emp-tag accent" id="empType">—</span>
        <span class="emp-tag" id="empJob">—</span>
        <span class="emp-tag" id="empShifts">—</span>
      </div>
      <div class="level-badge" id="levelBadge">
        <div class="level-icon" id="levelIcon">—</div>
        <div class="level-info">
          <div class="level-title" id="levelTitle">—</div>
          <div class="level-sub" id="levelSub">—</div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Смен в прошлом мес.</div>
        <div class="stat-value blue" id="statShifts">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Стаж работы</div>
        <div class="stat-value" id="statStazh">—</div>
      </div>
    </div>

    <!-- Stazh bonus -->
    <div class="stazh-block">
      <div class="stazh-inner">
        <div class="stazh-icon">🗓</div>
        <div class="stazh-info">
          <div class="stazh-label">Бонус за стаж</div>
          <div class="stazh-value" id="stazhBonusText">—</div>
        </div>
        <div class="stazh-bonus" id="stazhBonusBadge">—</div>
      </div>
    </div>

    <!-- Privileges -->
    <div class="privs-section">
      <div class="privs-title">Привилегии</div>
      <div id="privsList"></div>
    </div>

    <!-- Quarters -->
    <div class="quarters-section" id="quartersSection">
      <div class="quarters-title">Гостевые посещения в квартал</div>
      <div class="quarters-grid" id="quartersGrid"></div>
    </div>

    <div class="card-footer">
      По вопросам обращайся к управляющему
    </div>
  </div>

</div>

<script>
// ── Вставь сюда URL своего Google Apps Script Web App ──────────
// После деплоя скрипта скопируй URL и вставь сюда:
const GAS_URL = "https://script.google.com/macros/s/AKfycbynFLN4OJYW5lKYGXN_1uwhU40IjMTzNh_6bX9IC0yX19vur9ZOcPujCcTIX_zv7ST8KQ/exec";

// ── Для теста без Google Sheets — демо-данные ─────────────────
const DEMO_MODE = false;   // ← поменяй на false когда подключишь GAS

const DEMO_DATA = [
  {
    last:"Иванова", first:"Кристина", job:"Администратор", type:"Сменный",
    shifts:14, stazh:"1 г. 3 мес.", bonus:1,
    status:"⭐⭐⭐ Уровень 3 — личные + гостевые + +1 постоянный",
    free:"✅ Да", discount:"🎫 30%", guests:3,
    q1_rem:2, q2_rem:3, q3_rem:1, q4_rem:3,
    plus1_name:"Иванов Андрей", god_name:""
  },
  {
    last:"Голубев", first:"Андрей", job:"Тренер", type:"Тренер",
    shifts:0, stazh:"2 г. 5 мес.", bonus:1,
    status:"🔱 БОГ — все привилегии + +1 БЕСПЛАТНО на скалодром",
    free:"✅ Да", discount:"🎫 30%", guests:3,
    q1_rem:0, q2_rem:3, q3_rem:2, q4_rem:3,
    plus1_name:"Голубева Мария", god_name:"Голубев Тимур"
  },
  {
    last:"Бедрикова", first:"Ольга", job:"Кассир", type:"Подработка",
    shifts:3, stazh:"4 мес.", bonus:0,
    status:"❌ Нет привилегий (менее 5 смен)",
    free:"—", discount:"—", guests:0,
    q1_rem:null, q2_rem:null, q3_rem:null, q4_rem:null,
    plus1_name:"", god_name:""
  }
];

// ── Поиск ─────────────────────────────────────────────────────
function search() {
  const query = document.getElementById("nameInput").value.trim();
  if (!query) return;

  hideError();
  hideCard();
  showLoader();

  if (DEMO_MODE) {
    setTimeout(() => {
      const found = DEMO_DATA.filter(e =>
        e.last.toLowerCase().includes(query.toLowerCase()) ||
        e.first.toLowerCase().includes(query.toLowerCase())
      );
      hideLoader();
      if (found.length === 0) {
        showError("Сотрудник не найден. Проверь написание фамилии.");
      } else {
        renderCard(found[0]);
      }
    }, 600);
    return;
  }

  // Реальный запрос к Google Apps Script
  fetch(GAS_URL + "?name=" + encodeURIComponent(query))
    .then(r => r.json())
    .then(data => {
      hideLoader();
      if (!data || data.error) {
        showError(data?.error || "Сотрудник не найден.");
      } else {
        renderCard(data);
      }
    })
    .catch(() => {
      hideLoader();
      showError("Ошибка соединения. Попробуй ещё раз.");
    });
}

document.getElementById("nameInput").addEventListener("keydown", e => {
  if (e.key === "Enter") search();
});

// ── Рендер карточки ───────────────────────────────────────────
function renderCard(d) {
  // Имя
  document.getElementById("empName").textContent = d.last + " " + d.first;
  document.getElementById("empType").textContent = d.type || "—";
  document.getElementById("empJob").textContent = d.job || "—";
  document.getElementById("empShifts").textContent =
    d.type === "Тренер" ? "Тренер" : (d.shifts ? d.shifts + " смен" : "Нет данных");

  // Уровень
  const lvl = getLevelInfo(d.status);
  const badge = document.getElementById("levelBadge");
  badge.className = "level-badge " + lvl.cls;
  document.getElementById("levelIcon").textContent   = lvl.icon;
  document.getElementById("levelTitle").textContent  = lvl.title;
  document.getElementById("levelSub").textContent    = lvl.sub;

  // Статы
  document.getElementById("statShifts").textContent =
    d.type === "Тренер" ? "Тренер" : (d.shifts || "0");
  document.getElementById("statStazh").textContent = d.stazh || "—";

  // Стаж бонус
  const bonusActive = d.bonus == 1;
  document.getElementById("stazhBonusText").textContent =
    bonusActive ? "Стаж ≥ 1 года — +1 звезда к уровню" : "Нужен стаж от 1 года для бонуса";
  const bb = document.getElementById("stazhBonusBadge");
  bb.textContent   = bonusActive ? "+1 ★" : "Нет";
  bb.className     = "stazh-bonus" + (bonusActive ? "" : " inactive");

  // Привилегии
  renderPrivs(d, lvl.level);

  // Кварталы
  renderQuarters(d, lvl.level);

  showCard();
}

function getLevelInfo(status) {
  if (!status || status.includes("укажите") || status === "—")
    return { cls:"lvl0", icon:"❓", title:"НЕТ ДАННЫХ", sub:"Укажи тип занятости и смены", level:-1 };
  if (status.includes("БОГ"))
    return { cls:"lvl4", icon:"🔱", title:"БОГ", sub:"Все привилегии открыты + бесплатный +1", level:4 };
  if (status.includes("Уровень 3"))
    return { cls:"lvl3", icon:"⭐⭐⭐", title:"УРОВЕНЬ 3", sub:"Личные + гостевые + +1 со скидкой 30%", level:3 };
  if (status.includes("Уровень 2"))
    return { cls:"lvl2", icon:"⭐⭐", title:"УРОВЕНЬ 2", sub:"Личные посещения + гостевые", level:2 };
  if (status.includes("Уровень 1"))
    return { cls:"lvl1", icon:"⭐", title:"УРОВЕНЬ 1", sub:"Только личные посещения", level:1 };
  return { cls:"lvl0", icon:"❌", title:"НЕТ ПРИВИЛЕГИЙ", sub:"Менее 5 смен в прошлом месяце", level:0 };
}

function renderPrivs(d, level) {
  const list = document.getElementById("privsList");
  list.innerHTML = "";

  const privs = [
    {
      active: level >= 1,
      icon: "🧗",
      text: "Бесплатное самостоятельное посещение",
      badge: { text:"АВТО", cls:"auto" }
    },
    {
      active: level >= 1,
      icon: "🎫",
      text: "Скидка 30% на групповые занятия",
      badge: { text:"АВТО", cls:"auto" }
    },
    {
      active: level >= 2,
      icon: "👥",
      text: "3 гостевых посещения в квартал (скалодром + верёвочный парк)",
      badge: { text:"АВТО", cls:"auto" }
    },
    {
      active: level >= 3,
      icon: "👤",
      text: "+1 постоянный человек — скидка 30%" +
            (d.plus1_name ? " (" + d.plus1_name + ")" : ""),
      badge: { text:"УПР-ЩИЙ", cls:"manager" }
    },
    {
      active: level >= 4,
      god: true,
      icon: "🔱",
      text: "+1 человек БЕСПЛАТНО на тренировки" +
            (d.god_name ? " (" + d.god_name + ")" : ""),
      badge: { text:"БОГ", cls:"god-only" }
    },
  ];

  privs.forEach(p => {
    const el = document.createElement("div");
    el.className = "priv-item" + (p.active ? (p.god ? " god-priv" : " active") : " locked");
    el.innerHTML =
      `<span class="priv-dot"></span>` +
      `<span class="priv-icon">${p.icon}</span>` +
      `<span class="priv-text">${p.text}</span>` +
      `<span class="priv-badge ${p.badge.cls}">${p.badge.text}</span>`;
    list.appendChild(el);
  });
}

function renderQuarters(d, level) {
  const section = document.getElementById("quartersSection");
  if (level < 2) { section.style.display = "none"; return; }
  section.style.display = "";

  const grid = document.getElementById("quartersGrid");
  grid.innerHTML = "";

  const now = new Date();
  const currentQ = Math.ceil((now.getMonth() + 1) / 3);

  const quarters = [
    { label: "Q1 · Янв–Март",   rem: d.q1_rem, q: 1 },
    { label: "Q2 · Апр–Июн",    rem: d.q2_rem, q: 2 },
    { label: "Q3 · Июл–Сен",    rem: d.q3_rem, q: 3 },
    { label: "Q4 · Окт–Дек",    rem: d.q4_rem, q: 4 },
  ];

  quarters.forEach(qt => {
    const el = document.createElement("div");
    el.className = "q-item";
    const rem = qt.rem;
    const isCur = qt.q === currentQ;

    let cls = "na", barCls = "", barW = "0%";
    let display = "—", sub = "Нет доступа";

    if (rem !== null && rem !== undefined && rem !== "") {
      const n = parseInt(rem);
      display = n;
      if (n === 3) { cls="full"; barCls="full"; barW="100%"; sub="из 3 осталось"; }
      else if (n > 0) { cls="partial"; barCls="partial"; barW=(n/3*100)+"%"; sub="из 3 осталось"; }
      else { cls="empty"; barCls="empty"; barW="0%"; sub="использованы"; }
    }

    el.innerHTML =
      `<div class="q-label">${qt.label}${isCur ? " 🟢" : ""}</div>` +
      `<div class="q-remain ${cls}">${display}</div>` +
      `<div class="q-sub">${sub}</div>` +
      (barCls ? `<div class="q-bar ${barCls}" style="width:${barW}"></div>` : "");
    grid.appendChild(el);
  });
}

// ── Helpers ───────────────────────────────────────────────────
function showLoader()  { document.getElementById("loader").style.display = "block"; }
function hideLoader()  { document.getElementById("loader").style.display = "none"; }
function showCard()    { document.getElementById("resultCard").style.display = "block"; }
function hideCard()    { document.getElementById("resultCard").style.display = "none"; }
function showError(t)  { const e=document.getElementById("errorMsg"); e.textContent=t; e.style.display="block"; }
function hideError()   { document.getElementById("errorMsg").style.display = "none"; }
</script>
